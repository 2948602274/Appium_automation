基础配置:
  用例类型: AppCase
  一级模块: TevauPay
  二级模块: 登录功能
  用例标题: 正向的登录用例

前置条件:
  - ""

后置条件:
  - ""

用例步骤:
 - 点击关键字:
    操作类型: click_element
    页面元素: 登录按钮1

 - 输入邮箱关键字:
    操作类型: input_text
    页面元素: 邮箱输入框
    text: "{{user_email}}"

 - 输入验证码关键字:
    操作类型: input_text
    页面元素: 验证码输入框
    text: "{{verification_code}}"

 - 点击登录关键字:
    操作类型: click_element
    页面元素: 登录按钮2

 - 检查登陆结果:
    操作类型: 获取元素文本
    页面元素: 登录失败提示
    变量名: page_name

 - 断言:
    操作类型: 断言文本
    期望结果: '{{expect}}'
    实际结果: '{{page_name}}'
